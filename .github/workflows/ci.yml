name: CI

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Runs on every push and PR (Ubuntu + macOS).
  # Validates install_no_jre.sh logic via fast, mocked unit tests — no network,
  # no sudo, no real installs.
  # ---------------------------------------------------------------------------
  test-install-script:
    name: Unit-test install_no_jre.sh
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y bats

      - name: Install bats-core (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core

      - name: Run install_no_jre tests
        run: bats scripts/tests/install_no_jre.bats

  # ---------------------------------------------------------------------------
  # Runs on every push and PR.
  # Builds the Maven project and produces the no-JRE zip artifact.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build
        run: mvn clean install -DskipTests

      - name: Build no-JRE zip
        run: |
          chmod +x scripts/build-distribution-no-jre.sh
          ./scripts/build-distribution-no-jre.sh /tmp/steply-dist

      - name: Prepare zip for upload
        id: zip
        run: |
          ZIP_ORIG=$(ls /tmp/steply-*-no-jre.zip)
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ZIP_FINAL="/tmp/steply-${GITHUB_REF_NAME}-no-jre.zip"
            [[ "$ZIP_ORIG" != "$ZIP_FINAL" ]] && mv "$ZIP_ORIG" "$ZIP_FINAL"
          else
            ZIP_FINAL="$ZIP_ORIG"
          fi
          # Extract into a staging dir so upload-artifact doesn't double-wrap the zip
          ARTIFACT_DIR="/tmp/steply-artifact"
          mkdir -p "$ARTIFACT_DIR"
          unzip -q "$ZIP_FINAL" -d "$ARTIFACT_DIR"
          echo "path=$ZIP_FINAL" >> $GITHUB_OUTPUT
          echo "name=$(basename $ZIP_FINAL .zip)" >> $GITHUB_OUTPUT
          echo "artifact_dir=$ARTIFACT_DIR" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.name }}
          path: ${{ steps.zip.outputs.artifact_dir }}/
          retention-days: 7

      # -- TAG-ONLY: publish release zip to GitHub Releases ------------------
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: ${{ steps.zip.outputs.path }}

      # -- TAG-ONLY: bump VERSION in install scripts and raise a PR ----------
      - name: Update two install scripts with latest release tag
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/update-install-script-${TAG}"
          git fetch origin main
          git checkout -B "${BRANCH}" origin/main
          sed -i "s|^VERSION=.*|VERSION=\"${TAG}\" #This is the only variable to update when releasing a new version.|" scripts/install_no_jre.sh
          sed -i "s|^VERSION=.*|VERSION=\"${TAG}\" #This is the only variable to update when releasing a new version.|" scripts/install.sh
          git add scripts/install_no_jre.sh scripts/install.sh
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update install scripts for release ${TAG}"
            git push origin "${BRANCH}"
            gh pr create \
              --title "chore: update two install scripts for release ${TAG}" \
              --body "Automated PR to update \`VERSION\` in \`scripts/install.sh\` and \`scripts/install_no_jre.sh\` following release \`${TAG}\`." \
              --base main \
              --head "${BRANCH}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # TAG-ONLY: integration test — runs AFTER the release zip is published.
  # Downloads and executes install_no_jre.sh on a fresh Ubuntu runner to verify
  # the full end-to-end install flow: download → unzip → launcher → steply -v.
  # Java is pre-installed on the runner (same scenario as a typical CI user).
  # ---------------------------------------------------------------------------
  integration-test-install:
    name: Integration-test install_no_jre.sh (Ubuntu)
    needs: build
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run install_no_jre.sh using bash
        run: bash scripts/install_no_jre.sh

      - name: Run install_no_jre.sh via curl (mirrors real user experience)
        run: curl -fsSL https://raw.githubusercontent.com/QABEES/steply/main/scripts/install_no_jre.sh | bash

      - name: Verify steply is executable and responds to -v
        run: ~/.local/bin/steply -v
